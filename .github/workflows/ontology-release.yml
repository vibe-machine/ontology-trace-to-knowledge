name: ontology-release

on:
  workflow_dispatch:
    inputs:
      mode:
        description: dry-run or release
        required: true
        default: dry-run
      bump:
        description: patch, minor, or major
        required: true
        default: patch
      explicit_version:
        description: Exact version for release mode
        required: false
        default: ""
      push:
        description: Push branch and tag in release mode
        required: true
        type: boolean
        default: false

jobs:
  release:
    uses: vibe-machine/ontology-tooling/.github/workflows/ontology-release.yml@main
    with:
      mode: ${{ inputs.mode }}
      bump: ${{ inputs.bump }}
      explicit_version: ${{ inputs.explicit_version }}
      push: ${{ inputs.push }}
